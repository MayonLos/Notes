<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 210" width="680" height="210" font-family="'Times New Roman', serif" font-size="14">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#222"/>
    </marker>
  </defs>

  <!-- ===== 左图：原图（分支点在前）===== -->
  <text x="130" y="18" text-anchor="middle" font-size="12" fill="#555">原图</text>

  <!-- 分支点 -->
  <circle cx="80" cy="88" r="4" fill="#222"/>

  <!-- 方框 G（主路）-->
  <rect x="120" y="70" width="60" height="36" fill="white" stroke="#222" stroke-width="1.5" rx="2"/>
  <text x="150" y="93" text-anchor="middle" font-style="italic">G</text>

  <!-- R → 分支点 -->
  <line x1="22" y1="88" x2="76" y2="88" stroke="#222" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="12" y="92" text-anchor="middle" font-style="italic" font-size="13">R</text>

  <!-- 分支点 → G主 -->
  <line x1="84" y1="88" x2="118" y2="88" stroke="#222" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 分支点 → B（向下，直接输出）-->
  <line x1="80" y1="92" x2="80" y2="155" stroke="#222" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="80" y="172" text-anchor="middle" font-style="italic" font-size="13">B</text>

  <!-- G → C -->
  <line x1="180" y1="88" x2="240" y2="88" stroke="#222" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="250" y="92" font-style="italic" font-size="13">C</text>

  <!-- ===== 分隔线 ===== -->
  <line x1="300" y1="20" x2="300" y2="185" stroke="#bbb" stroke-width="1" stroke-dasharray="5,4"/>
  <text x="300" y="108" text-anchor="middle" font-size="22" fill="#888">⟹</text>

  <!-- ===== 右图：等效图（分支点后移）===== -->
  <text x="510" y="18" text-anchor="middle" font-size="12" fill="#555">等效图（分支点后移）</text>

  <!-- 方框 G（主路）-->
  <rect x="345" y="70" width="60" height="36" fill="white" stroke="#222" stroke-width="1.5" rx="2"/>
  <text x="375" y="93" text-anchor="middle" font-style="italic">G</text>

  <!-- 分支点（移到 G 之后）-->
  <circle cx="460" cy="88" r="4" fill="#222"/>

  <!-- 方框 1/G（支路）-->
  <rect x="440" y="130" width="60" height="36" fill="white" stroke="#222" stroke-width="1.5" rx="2"/>
  <text x="470" y="153" text-anchor="middle" font-size="13">1/<tspan font-style="italic">G</tspan></text>

  <!-- R → G -->
  <line x1="318" y1="88" x2="343" y2="88" stroke="#222" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="308" y="92" text-anchor="middle" font-style="italic" font-size="13">R</text>

  <!-- G → 分支点 -->
  <line x1="405" y1="88" x2="456" y2="88" stroke="#222" stroke-width="1.5"/>

  <!-- 分支点 → C -->
  <line x1="464" y1="88" x2="510" y2="88" stroke="#222" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="520" y="92" font-style="italic" font-size="13">C</text>

  <!-- 分支点 → 1/G（向下）-->
  <line x1="460" y1="92" x2="460" y2="130" stroke="#222" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 1/G → B -->
  <line x1="500" y1="148" x2="540" y2="148" stroke="#222" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="550" y="152" font-style="italic" font-size="13">B</text>
</svg>
