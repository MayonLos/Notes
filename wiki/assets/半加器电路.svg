<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 200" width="380" height="200" font-family="'Courier New', monospace" font-size="13">
  <rect width="380" height="200" fill="#fafafa" rx="6"/>
  <text x="190" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">半加器（Half Adder）</text>

  <!-- Inputs A, B -->
  <text x="14" y="82" font-size="13" font-weight="bold" fill="#222">A</text>
  <text x="14" y="142" font-size="13" font-weight="bold" fill="#222">B</text>

  <!-- A line -->
  <line x1="28" y1="78" x2="80" y2="78" stroke="#222" stroke-width="1.5"/>
  <!-- B line -->
  <line x1="28" y1="138" x2="80" y2="138" stroke="#222" stroke-width="1.5"/>

  <!-- branch dots -->
  <circle cx="60" cy="78" r="3.5" fill="#222"/>
  <circle cx="60" cy="138" r="3.5" fill="#222"/>

  <!-- XOR gate (Sum) -->
  <g transform="translate(80, 60)">
    <line x1="0" y1="18" x2="0" y2="18" stroke="#222" stroke-width="1.5"/>
    <line x1="0" y1="38" x2="0" y2="38" stroke="#222" stroke-width="1.5"/>
    <rect x="0" y="8" width="60" height="44" fill="white" stroke="#4a7cc7" stroke-width="2" rx="3"/>
    <text x="30" y="35" text-anchor="middle" font-size="14" font-weight="bold" fill="#4a7cc7">=1</text>
    <line x1="60" y1="30" x2="100" y2="30" stroke="#222" stroke-width="1.5"/>
  </g>

  <!-- AND gate (Carry) -->
  <g transform="translate(80, 120)">
    <rect x="0" y="8" width="60" height="44" fill="white" stroke="#c74a4a" stroke-width="2" rx="3"/>
    <text x="30" y="35" text-anchor="middle" font-size="15" font-weight="bold" fill="#c74a4a">&amp;</text>
    <line x1="60" y1="30" x2="100" y2="30" stroke="#222" stroke-width="1.5"/>
  </g>

  <!-- Vertical wires connecting inputs to both gates -->
  <!-- A to XOR top input -->
  <line x1="60" y1="78" x2="60" y2="78" stroke="#222" stroke-width="1.5"/>
  <line x1="60" y1="68" x2="80" y2="68" stroke="#222" stroke-width="1.5"/>
  <line x1="60" y1="78" x2="60" y2="68" stroke="#222" stroke-width="1.5"/>
  <!-- B to XOR bottom input -->
  <line x1="70" y1="138" x2="70" y2="98" stroke="#222" stroke-width="1.5"/>
  <line x1="70" y1="98" x2="80" y2="98" stroke="#222" stroke-width="1.5"/>
  <line x1="28" y1="138" x2="70" y2="138" stroke="#222" stroke-width="0.5" stroke-dasharray="2,0"/>

  <!-- A to AND top input -->
  <line x1="60" y1="78" x2="60" y2="128" stroke="#222" stroke-width="1.5"/>
  <line x1="60" y1="128" x2="80" y2="128" stroke="#222" stroke-width="1.5"/>
  <!-- B to AND bottom input -->
  <line x1="28" y1="138" x2="80" y2="158" stroke="#222" stroke-width="1.5"/>

  <!-- Output labels -->
  <text x="188" y="91" font-size="13" font-weight="bold" fill="#4a7cc7">S</text>
  <text x="182" y="87" font-size="10" fill="#4a7cc7">（和位）</text>
  <text x="188" y="153" font-size="13" font-weight="bold" fill="#c74a4a">Cout</text>
  <text x="188" y="168" font-size="10" fill="#c74a4a">（进位）</text>

  <!-- Formulas -->
  <rect x="10" y="170" width="360" height="24" fill="#f0f4ff" rx="4"/>
  <text x="190" y="186" text-anchor="middle" font-size="11" fill="#555">S = A ⊕ B      Cout = A · B</text>
</svg>
