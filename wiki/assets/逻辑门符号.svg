<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 260" width="540" height="260" font-family="'Courier New', monospace" font-size="13">
  <rect width="540" height="260" fill="#fafafa" rx="6"/>
  <text x="270" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">基本逻辑门（IEC 60617 标准）</text>

  <!-- === 行1：AND, OR, NOT === -->

  <!-- AND gate -->
  <g transform="translate(20, 45)">
    <text x="65" y="-6" text-anchor="middle" font-size="11" fill="#666">AND 与门</text>
    <line x1="0" y1="18" x2="28" y2="18" stroke="#222" stroke-width="1.5"/>
    <line x1="0" y1="34" x2="28" y2="34" stroke="#222" stroke-width="1.5"/>
    <rect x="28" y="8" width="48" height="36" fill="white" stroke="#222" stroke-width="1.5" rx="2"/>
    <text x="52" y="31" text-anchor="middle" font-size="15" font-weight="bold" fill="#111">&amp;</text>
    <line x1="76" y1="26" x2="104" y2="26" stroke="#222" stroke-width="1.5"/>
    <text x="2" y="16" font-size="10" fill="#555">A</text>
    <text x="2" y="32" font-size="10" fill="#555">B</text>
    <text x="95" y="24" font-size="10" fill="#555">F</text>
    <text x="52" y="54" text-anchor="middle" font-size="10" fill="#888">F = A·B</text>
  </g>

  <!-- OR gate -->
  <g transform="translate(200, 45)">
    <text x="65" y="-6" text-anchor="middle" font-size="11" fill="#666">OR 或门</text>
    <line x1="0" y1="18" x2="28" y2="18" stroke="#222" stroke-width="1.5"/>
    <line x1="0" y1="34" x2="28" y2="34" stroke="#222" stroke-width="1.5"/>
    <rect x="28" y="8" width="48" height="36" fill="white" stroke="#222" stroke-width="1.5" rx="2"/>
    <text x="52" y="31" text-anchor="middle" font-size="13" font-weight="bold" fill="#111">≥1</text>
    <line x1="76" y1="26" x2="104" y2="26" stroke="#222" stroke-width="1.5"/>
    <text x="2" y="16" font-size="10" fill="#555">A</text>
    <text x="2" y="32" font-size="10" fill="#555">B</text>
    <text x="95" y="24" font-size="10" fill="#555">F</text>
    <text x="52" y="54" text-anchor="middle" font-size="10" fill="#888">F = A+B</text>
  </g>

  <!-- NOT gate -->
  <g transform="translate(380, 45)">
    <text x="55" y="-6" text-anchor="middle" font-size="11" fill="#666">NOT 非门</text>
    <line x1="0" y1="26" x2="28" y2="26" stroke="#222" stroke-width="1.5"/>
    <rect x="28" y="8" width="48" height="36" fill="white" stroke="#222" stroke-width="1.5" rx="2"/>
    <text x="52" y="31" text-anchor="middle" font-size="15" font-weight="bold" fill="#111">1</text>
    <circle cx="80" cy="26" r="4" fill="white" stroke="#222" stroke-width="1.5"/>
    <line x1="84" y1="26" x2="110" y2="26" stroke="#222" stroke-width="1.5"/>
    <text x="2" y="24" font-size="10" fill="#555">A</text>
    <text x="100" y="24" font-size="10" fill="#555">F</text>
    <text x="55" y="54" text-anchor="middle" font-size="10" fill="#888">F = Ā</text>
  </g>

  <!-- === 行2：NAND, NOR, XOR === -->

  <!-- NAND gate -->
  <g transform="translate(20, 155)">
    <text x="65" y="-6" text-anchor="middle" font-size="11" fill="#666">NAND 与非门</text>
    <line x1="0" y1="18" x2="28" y2="18" stroke="#222" stroke-width="1.5"/>
    <line x1="0" y1="34" x2="28" y2="34" stroke="#222" stroke-width="1.5"/>
    <rect x="28" y="8" width="48" height="36" fill="white" stroke="#222" stroke-width="1.5" rx="2"/>
    <text x="52" y="31" text-anchor="middle" font-size="15" font-weight="bold" fill="#111">&amp;</text>
    <circle cx="80" cy="26" r="4" fill="white" stroke="#222" stroke-width="1.5"/>
    <line x1="84" y1="26" x2="110" y2="26" stroke="#222" stroke-width="1.5"/>
    <text x="2" y="16" font-size="10" fill="#555">A</text>
    <text x="2" y="32" font-size="10" fill="#555">B</text>
    <text x="100" y="24" font-size="10" fill="#555">F</text>
    <text x="52" y="54" text-anchor="middle" font-size="10" fill="#888">F = A·B̄  (通用门)</text>
  </g>

  <!-- NOR gate -->
  <g transform="translate(200, 155)">
    <text x="65" y="-6" text-anchor="middle" font-size="11" fill="#666">NOR 或非门</text>
    <line x1="0" y1="18" x2="28" y2="18" stroke="#222" stroke-width="1.5"/>
    <line x1="0" y1="34" x2="28" y2="34" stroke="#222" stroke-width="1.5"/>
    <rect x="28" y="8" width="48" height="36" fill="white" stroke="#222" stroke-width="1.5" rx="2"/>
    <text x="52" y="31" text-anchor="middle" font-size="13" font-weight="bold" fill="#111">≥1</text>
    <circle cx="80" cy="26" r="4" fill="white" stroke="#222" stroke-width="1.5"/>
    <line x1="84" y1="26" x2="110" y2="26" stroke="#222" stroke-width="1.5"/>
    <text x="2" y="16" font-size="10" fill="#555">A</text>
    <text x="2" y="32" font-size="10" fill="#555">B</text>
    <text x="100" y="24" font-size="10" fill="#555">F</text>
    <text x="52" y="54" text-anchor="middle" font-size="10" fill="#888">F = A+B̄  (通用门)</text>
  </g>

  <!-- XOR gate -->
  <g transform="translate(380, 155)">
    <text x="55" y="-6" text-anchor="middle" font-size="11" fill="#666">XOR 异或门</text>
    <line x1="0" y1="18" x2="28" y2="18" stroke="#222" stroke-width="1.5"/>
    <line x1="0" y1="34" x2="28" y2="34" stroke="#222" stroke-width="1.5"/>
    <rect x="28" y="8" width="48" height="36" fill="white" stroke="#222" stroke-width="1.5" rx="2"/>
    <text x="52" y="31" text-anchor="middle" font-size="13" font-weight="bold" fill="#111">=1</text>
    <line x1="76" y1="26" x2="110" y2="26" stroke="#222" stroke-width="1.5"/>
    <text x="2" y="16" font-size="10" fill="#555">A</text>
    <text x="2" y="32" font-size="10" fill="#555">B</text>
    <text x="100" y="24" font-size="10" fill="#555">F</text>
    <text x="55" y="54" text-anchor="middle" font-size="10" fill="#888">F = A⊕B</text>
  </g>
</svg>
